name: Build FPK Package

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from manifest
        id: version
        run: |
          VERSION=$(grep '^version' manifest | awk -F'=' '{print $2}' | xargs)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Build FPK package
        run: |
          VERSION=${{ steps.version.outputs.version }}
          FPK_NAME="com.dustinky.qwenpaw-${VERSION}.fpk"

          echo "Building ${FPK_NAME}..."

          # Copy files to temp directory to avoid "file changed as we read it" errors
          TEMP_DIR=$(mktemp -d)
          cp -r . "$TEMP_DIR/"

          # Remove non-essential files from temp copy
          rm -rf "$TEMP_DIR/.git" "$TEMP_DIR/.github" "$TEMP_DIR/.gitignore"

          # Create the fpk package (tar.gz) from temp directory
          tar czf "${FPK_NAME}" -C "$TEMP_DIR" .

          # Cleanup temp directory
          rm -rf "$TEMP_DIR"

          echo "FPK package built: ${FPK_NAME}"
          ls -lh "${FPK_NAME}"

          # Generate checksum
          sha256sum "${FPK_NAME}" > "${FPK_NAME}.sha256"
          cat "${FPK_NAME}.sha256"

      - name: Upload FPK artifact
        uses: actions/upload-artifact@v4
        with:
          name: fpk-package
          path: |
            *.fpk
            *.sha256
          retention-days: 30

      - name: Create Release (if tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            *.fpk
            *.sha256
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
