name: Build FPK Package

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from manifest
        id: version
        run: |
          VERSION=$(grep '^version' manifest | awk -F'=' '{print $2}' | xargs)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Build FPK package
        run: |
          VERSION=${{ steps.version.outputs.version }}
          FPK_NAME="com.dustinky.qwenpaw_x86_64_v${VERSION}.fpk"

          echo "Building ${FPK_NAME}..."

          # Create staging directory
          STAGING_DIR=$(mktemp -d)

          # Copy base files
          cp manifest "$STAGING_DIR/"
          cp LICENSE "$STAGING_DIR/"

          # Copy ICON files with uppercase extensions
          cp ICON.png "$STAGING_DIR/ICON.PNG"
          cp ICON_256.png "$STAGING_DIR/ICON_256.PNG"

          # Copy cmd, config, wizard directories
          cp -r cmd "$STAGING_DIR/"
          cp -r config "$STAGING_DIR/"
          cp -r wizard "$STAGING_DIR/"

          # Create app.tgz from app directory
          tar czf "$STAGING_DIR/app.tgz" app/

          # Calculate checksum (MD5 of app.tgz)
          CHECKSUM=$(md5sum "$STAGING_DIR/app.tgz" | awk '{print $1}')
          echo "Checksum: $CHECKSUM"

          # Add checksum to manifest if not present
          if ! grep -q "^checksum" "$STAGING_DIR/manifest"; then
            echo "checksum                   = $CHECKSUM" >> "$STAGING_DIR/manifest"
          else
            sed -i "s/^checksum.*/checksum                   = $CHECKSUM/" "$STAGING_DIR/manifest"
          fi

          # Create the fpk package (tar.gz)
          tar czf "${FPK_NAME}" -C "$STAGING_DIR" .

          # Cleanup staging directory
          rm -rf "$STAGING_DIR"

          echo "FPK package built: ${FPK_NAME}"
          ls -lh "${FPK_NAME}"

          # Generate checksum file for GitHub
          sha256sum "${FPK_NAME}" > "${FPK_NAME}.sha256"
          cat "${FPK_NAME}.sha256"

      - name: Upload FPK artifact
        uses: actions/upload-artifact@v4
        with:
          name: fpk-package
          path: |
            *.fpk
            *.sha256
          retention-days: 30

      - name: Create Release (if tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            *.fpk
            *.sha256
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
